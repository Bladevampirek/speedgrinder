<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Touch Typing Home Row Speed Grinder 2.0</title>

<style>
:root{
  --fg:#21ff21;
  --bg:#000000;
  --muted:rgba(33,255,33,.55);
  --fontSize:16px;
}

body{
  margin:0;
  min-height:100vh;
  display:grid;
  place-items:center;
  background:#0b0c0f;
  font-family:Consolas,"Lucida Console","Courier New",monospace;
}

.window{
  width:min(1100px,94vw);
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,.6);
  border:1px solid rgba(255,255,255,.08);
}

/* ===== DARK TITLE BAR ===== */
.titlebar{
  height:34px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 10px;
  background:#000;
  color:#dcdcdc;
  font-family:"Segoe UI",Tahoma,Arial,sans-serif;
  font-size:12.5px;
  border-bottom:1px solid rgba(255,255,255,.08);
}

.title-left{
  display:flex;
  align-items:center;
  gap:8px;
}

.icon{
  width:14px;
  height:14px;
  background:#111;
  border:1px solid rgba(255,255,255,.2);
}

.win-controls{
  display:flex;
  gap:6px;
}

.btn{
  width:40px;
  height:22px;
  border-radius:3px;
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.15);
}

.btn.close{
  background:rgba(180,60,60,.6);
}

#prompt{
  background:var(--bg);
  color:var(--fg);
  padding:18px;
  font-size:var(--fontSize);
  outline:none;
}

.line{ line-height:1.55; white-space:pre-wrap; }
.muted{ color:var(--muted); }

.cursor{
  display:inline-block;
  width:9px;
  height:1.1em;
  background:var(--fg);
  animation:blink 1s steps(1) infinite;
}

@keyframes blink{50%{opacity:0;}}

.word{
  display:inline-block;
  padding:2px 6px;
  margin:0 6px 6px 0;
  border-radius:6px;
}

.word.active{
  background:rgba(33,255,33,.12);
  border:1px solid rgba(33,255,33,.35);
}

.syll{ opacity:.7; }
.syll.active{
  opacity:1;
  background:rgba(33,255,33,.2);
  padding:0 3px;
  border-radius:4px;
}

.hyph{ opacity:.5; }

.progress-wrap{
  display:flex;
  align-items:center;
  gap:10px;
  margin:10px 0;
}

.progress-bar{
  width:4in;
  max-width:70vw;
  height:12px;
  border-radius:999px;
  border:1px solid rgba(33,255,33,.35);
  overflow:hidden;
}

.progress-fill{
  height:100%;
  width:0%;
  background:rgba(33,255,33,.6);
  transition:width .1s linear;
}

.status{
  margin-top:10px;
  padding-top:10px;
  border-top:1px solid rgba(33,255,33,.25);
  display:grid;
  grid-template-columns:1fr auto;
  gap:6px 14px;
  font-size:.85em;
}

.shake{
  animation:shake .12s;
}

@keyframes shake{
  0%{transform:translateX(0)}
  25%{transform:translateX(-6px)}
  50%{transform:translateX(6px)}
  75%{transform:translateX(-4px)}
  100%{transform:translateX(0)}
}

.entry textarea{
  width:100%;
  min-height:50px;
  background:#000;
  color:var(--fg);
  border:1px solid rgba(33,255,33,.35);
  padding:8px;
  font-family:inherit;
}
</style>
</head>

<body>
<div class="window">
  <div class="titlebar">
    <div class="title-left">
      <div class="icon"></div>
      <div>Touch Typing Home Row Speed Grinder 2.0</div>
    </div>
    <div class="win-controls">
      <div class="btn"></div>
      <div class="btn"></div>
      <div class="btn close"></div>
    </div>
  </div>

  <div id="prompt" tabindex="0">
    <div class="line">Microsoft Windows [Version 6.1.7601]</div>
    <div class="line">(c) 2009 Microsoft Corporation. All rights reserved.</div>
    <div class="line muted">
      Example: fl-ower mo-tion<br>
      Type highlighted syllable(s). Finish data, then press Space.
    </div>

    <div class="entry">
      <textarea id="inputData" placeholder="fl-ower mo-tion"></textarea>
      <button onclick="loadData()">Load data</button>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar">
        <div class="progress-fill" id="progress"></div>
      </div>
      <span id="progressPct">0%</span>
    </div>

    <div class="line" id="display"></div>
    <div class="line">C:\Users\Trainee&gt; <span id="typed"></span><span class="cursor"></span></div>

    <div class="status">
      <div id="status"></div>
      <div>
        <span id="rollover">Rollover:0</span>
        <span id="errors">Errors:0</span>
        <span id="wpm">WPM:0</span>
        <span id="acc">Acc:100%</span>
      </div>
      <div id="summary" style="grid-column:1/-1"></div>
    </div>
  </div>
</div>

<script>
let words=[],syll=[],wi=0,si=0,buf="";
let errors=0,roll=0,total=0,correct=0;
let problems={};

function loadData(){
  words=document.getElementById("inputData").value.trim().split(" ");
  syll=words.map(w=>w.split("-"));
  wi=si=errors=roll=total=correct=0;
  problems={};
  render();
}

function render(){
  if(!words.length){
    display.innerHTML="<span class='muted'>No data loaded</span>";
    return;
  }
  let out="";
  words.slice(wi,wi+5).forEach((w,i)=>{
    if(i===0){
      out+=`<span class="word active">${syll[wi].map((s,j)=>`<span class="syll ${j===si?"active":""}">${s}</span>`).join("<span class='hyph'>-</span>")}</span>`;
    }else out+=`<span class="word">${w}</span>`;
  });
  display.innerHTML=out;
  typed.textContent=buf;
  progress.style.width=`${Math.round(wi/words.length*100)}%`;
  progressPct.textContent=Math.round(wi/words.length*100)+"%";
  errorsEl.textContent="Errors:"+errors;
}

window.addEventListener("keydown",e=>{
  if(!words.length)return;
  if(e.key===" "){
    if(buf===syll[wi][si]){
      si++;
      buf="";
      if(si>=syll[wi].length){wi++;si=0;}
    }else{
      errors++;problems[e.key]=(problems[e.key]||0)+1;
      buf="";
      prompt.classList.add("shake");
    }
    render();
    e.preventDefault();
    return;
  }
  if(e.key.length===1){
    total++;
    buf+=e.key;
    if(!syll[wi][si].startsWith(buf)){
      errors++;problems[e.key]=(problems[e.key]||0)+1;
      buf="";
      prompt.classList.add("shake");
    }else correct++;
    render();
  }
});
</script>
</body>
</html>
